# https://git-cliff.org/docs/configuration

[remote.github]
owner = "polyclient"
repo = "polyclient"

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{% macro print_commit(commit) -%}
    - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
        {% if commit.breaking %}[**breaking**] {% endif %}\
        {{ commit.message | upper_first }} - \
        ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }})) by {% if commit.remote.username %} [@{{commit.remote.username}}](https://github.com/{{commit.remote.username}}) {% else %} {{ commit.author.name }}{% endif %}
{% endmacro -%}

{% if version %}\
    {% if previous.version %}\
        ## [{{ version | trim_start_matches(pat="v") }}]\
          ({{ self::remote_url() }}/compare/{{ previous.version }}..{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
    {% else %}\
        ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
    {% endif %}\
{% else %}\
    ## [unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}

    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits    
    | filter(attribute="scope")
    | sort(attribute="scope") %}
        {{ self::print_commit(commit=commit) }}
    {%- endfor %}
    {% for commit in commits %}
        {%- if not commit.scope -%}
            {{ self::print_commit(commit=commit) }}
        {% endif -%}
    {% endfor -%}
{% endfor -%}

{%- if github -%}
  {%- set first_time_contributors = github.contributors | filter(attribute="is_first_time", value=true) %}
  {% if first_time_contributors | length != 0 %}
    ### Thanks to {{ first_time_contributors | length }} new contributors!
  
    {% for contributor in first_time_contributors %}
      * @{{ contributor.username }} made their first contribution
        {%- if contributor.pr_number %} in \
          [#{{ contributor.pr_number }}]({{ self::remote_url() }}/pull/{{ contributor.pr_number }}) \
        {%- endif %}
    {%- endfor -%}
  {% endif %}\
{%- endif %}\n
"""
trim = true
postprocessors = [
  { pattern = '<REPO>', replace = "https://github.com/polyclient/polyclient" },
  { pattern = "\\[bot\\]", replace = "" },
]

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
  # Replace issue numbers
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](<REPO>/issues/${2}))" },
]
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^refactor", group = "<!-- 2 -->Refactor" },
  { message = "^perf", group = "<!-- 3 -->Performance" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^style", group = "<!-- 5 -->Styling" },
  { message = "^test", group = "<!-- 6 -->Testing" },
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore\\(pr\\)", skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "^tmp", skip = true },
  { message = "^Merged branch", skip = true },
  { message = "^Merged pull request", skip = true },
  { message = "^Merged remote-tracking branch", skip = true },
  { body = ".*security", group = "<!-- 7 -->Security" },
  { message = ".*", group = "<!-- 8 -->Other Changes" },
]
protect_breaking_commits = false
filter_commits = false
topo_order = false
sort_commits = "newest"
tag_pattern = "v[0-9].*"
# Changes belonging to these releases will be included in the next release.
# skip_tags = "beta|alpha" TODO: Enable this when we have a stable release
