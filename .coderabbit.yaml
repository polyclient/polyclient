# yaml-language-server: $schema=https://raw.githubusercontent.com/coderabbitai/coderabbit-docs/refs/heads/main/static/schema/schema.v2.json

language: "en"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: false
  collapse_walkthrough: true
  path_filters:
    - "!**/*.pb.go"
    - "!**/*.pb.gw.go"
    - "!**/*.mod"
    - "!**/*.sum"
  path_instructions:
    - path: "**/*.go"
      instructions: "Review the Go code for conformity with the Effective Go style guide (https://go.dev/doc/effective_go), highlighting any deviations."
    - path: "e2e/**/*"
      instructions: |
        "Assess the integration and e2e test code assessing sufficient code coverage for the changes associated in the pull request"
    - path: "**/*_test.go"
      instructions: |
        "Assess the unit test code assessing sufficient code coverage for the changes associated in the pull request"
    - path: "**/*.md"
      instructions: |
        "Assess the documentation for misspellings, grammatical errors, missing documentation and correctness"
  auto_review:
    enabled: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "draft"
    drafts: false
    base_branches:
      - "main"
chat:
  auto_reply: true
