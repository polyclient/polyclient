version: "3"

vars:
  APP_NAME: polyclient

tasks:
  install:
    summary: Installs the project dependencies and devtools
    cmds:
      - go mod tidy
      - go mod download
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

  build:
    summary: Builds the application
    cmd: go build -o ./bin/{{ .APP_NAME }}

  build:plugins:
    summary: Builds the plugins
    cmds:
      - go build -o ./plugins/db_sqlite/bin/{{ .APP_NAME }}-db-sqlite ./plugins/db_sqlite/...

  dev:
    summary: Runs the application
    deps: [build:plugins]
    cmd: go run main.go

  test:
    desc: "Run unit tests"
    cmd: go test ./...

  test:coverage:
    desc: "Run unit tests and generate coverage report"
    cmds:
      - go test ./... -v -race -cover -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: "Lints the project"
    cmds:
      - golangci-lint run ./...

  lint:fix:
    desc: "Lint the project using golangci-lint and fix any fixable issues"
    cmds:
      - golangci-lint run ./... --fix

  format:
    desc: "Formats the project"
    cmds:
      - go fmt ./...

  proto:
    desc: "Generates proto files"
    cmds:
      - protoc --go_out=. --go_opt=paths=source_relative --go-grpc_out=. --go-grpc_opt=paths=source_relative ./proto/*.proto