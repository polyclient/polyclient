version: "2"

run:
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dupword
    - errorlint
    - fatcontext
    - gocognit
    - gocritic
    - godot
    - godox
    - goheader
    - gomodguard
    - gosec
    - govet
    - grouper
    - misspell
    - mnd
    - musttag
    - nilerr
    - nilnil
    - noctx
    - perfsprint
    - prealloc
    - predeclared
    - revive
    - staticcheck
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - wastedassign
    - whitespace
    - wsl
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    goheader:
      values:
        regexp:
          copyright-holder: "{{mod-year}} The PolyClient Authors"
      template: |-
        SPDX-FileCopyrightText: {{copyright-holder}}

        SPDX-License-Identifier: GPL-3.0-or-later WITH LicenseRef-PolyClient-Plugin-Exception
    govet:
      enable:
        - nilness
        - reflectvaluecompare
        - sortslice
        - unusedwrite
    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
      ignored-functions:
        - ^math\.
        - ^http\.StatusText$
        - ^os\.Mkdir$
        - ^os\.MkdirAll$
        - ^os\.Chmod$
        - ^os\.OpenFile$
        - ^os\.WriteFile$
        - ^os\.Lstat$
        - ^os\.Stat$
        - ^os\.Fchmod$
        - ^os\.Fchmodat$
        - ^syscall\.Mkfifo$
        - ^syscall\.Mknod$
        - ^syscall\.Open$
        - ^syscall\.Fchmod$
    revive:
      confidence: 0.8
      severity: error
      rules:
        - name: line-length-limit
          arguments:
            - 200
        - name: var-naming
          arguments:
            - []
            - - AES
              - API
              - ASCII
              - AST
              - AWS
              - BOM
              - CLI
              - CPU
              - CSS
              - CSV
              - DNS
              - DOM
              - DOML
              - EOF
              - FTP
              - GUI
              - HTML
              - HTTP
              - HTTPS
              - ID
              - IDE
              - IP
              - IPv4
              - IPv6
              - IRC
              - ISO
              - JPEG
              - JSON
              - JWT
              - KPI
              - LDAP
              - LSP
              - MAC
              - MD5
              - MIME
              - MVC
              - NTP
              - OAuth
              - OS
              - PCI
              - PDF
              - PNG
              - REST
              - RSA
              - S3
              - SAML
              - SHA
              - SMTP
              - SOAP
              - SQL
              - SSH
              - SSL
              - TCP
              - TLS
              - TOML
              - TSV
              - UDP
              - UI
              - UID
              - UIX
              - URI
              - URL
              - UTF8
              - UUID
              - VPN
              - Wasm
              - WebGL
              - WebRTC
              - WebSocket
              - WebWorker
              - WSL
              - XML
              - XSS
              - YAML
              - ZIP
        - name: dot-imports
        - name: duplicated-imports
        - name: blank-imports
        - name: exported
        - name: receiver-naming
        - name: increment-decrement
        - name: indent-error-flow
        - name: empty-lines
        - name: early-return
        - name: filename-format
          arguments:
            - ^[_a-z][_a-z0-9]*\.go$
        - name: confusing-naming
        - name: confusing-results
        - name: empty-block
          arguments:
            - if
            - else
            - for
            - switch
        - name: superfluous-else
        - name: unreachable-code
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: use-errors-new
        - name: unhandled-error
          arguments:
            - fmt.Printf
            - fmt.Println
            - fmt.Print
            - fmt.Fprintf
            - log.Print
            - log.Printf
            - log.Println
            - file.Close
            - strings.Builder.WriteString
        - name: context-as-argument
        - name: context-keys-type
        - name: enforce-map-style
          arguments:
            - literal
        - name: enforce-slice-style
          arguments:
            - literal
        - name: enforce-repeated-arg-type-style
          arguments:
            - short
        - name: var-declaration
        - name: time-naming
        - name: use-any
        - name: identical-branches
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: unexported-return
        - name: unexported-naming
        - name: atomic
        - name: waitgroup-by-value
        - name: bool-literal-in-expr
        - name: constant-logical-expr
        - name: datarace
        - name: deep-exit
        - name: defer
        - name: flag-parameter
        - name: import-shadowing
        - name: modifies-parameter
        - name: modifies-value-receiver
        - name: range
        - name: range-val-in-closure
        - name: range-val-address
        - name: string-format
        - name: struct-tag
        - name: unconditional-recursion
        - name: unnecessary-stmt
        - name: useless-break
        - name: comment-spacings
        - name: cyclomatic
          arguments:
            - 15
    whitespace:
      multi-if: true
      multi-func: true
    wsl:
      allow-cuddle-declarations: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - gocritic
          - gocyclo
          - gosec
          - govet
          - noctx
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
