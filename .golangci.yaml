run:
  allow-parallel-runners: true
  timeout: 5m

linters:
  disable-all: true
  enable:
    # General
    - goheader # https://golangci-lint.run/usage/linters/#goheader
    - revive # https://golangci-lint.run/usage/linters/#revive

    # Critical safety and correctness
    - gosec # https://golangci-lint.run/usage/linters/#gosec
    - govet # https://golangci-lint.run/usage/linters/#govet
    - staticcheck # https://golangci-lint.run/usage/linters/#staticcheck
    - gocritic # https://golangci-lint.run/usage/linters/#gocritic

    # Code quality
    - gocognit # https://golangci-lint.run/usage/linters/#gocognit
    - nilerr # https://golangci-lint.run/usage/linters/#nilerr
    - nilnil # https://golangci-lint.run/usage/linters/#nilnil
    - noctx # https://golangci-lint.run/usage/linters/#noctx
    - unconvert # https://golangci-lint.run/usage/linters/#unconvert

    # Performance and efficiency
    - bodyclose # https://golangci-lint.run/usage/linters/#bodyclose
    - perfsprint # https://golangci-lint.run/usage/linters/#perfsprint
    - prealloc # https://golangci-lint.run/usage/linters/#prealloc

    # Code cleanliness
    - godot # https://golangci-lint.run/usage/linters/#godot
    - godox # https://golangci-lint.run/usage/linters/#godox
    - gofmt # https://golangci-lint.run/usage/linters/#gofmt
    - gosimple # https://golangci-lint.run/usage/linters/#gosimple
    - grouper # https://golangci-lint.run/usage/linters/#grouper
    - dupword # https://golangci-lint.run/usage/linters/#dupword
    - mnd # https://golangci-lint.run/usage/linters/#mnd
    - whitespace # https://golangci-lint.run/usage/linters/#whitespace
    - wsl # https://golangci-lint.run/usage/linters/#wsl

    # Modern Go practices
    - gomodguard # https://golangci-lint.run/usage/linters/#gomodguard
    - wastedassign # https://golangci-lint.run/usage/linters/#wastedassign

    # Context and concurrency
    - copyloopvar # https://golangci-lint.run/usage/linters/#copyloopvar
    - fatcontext # https://golangci-lint.run/usage/linters/#fatcontext

    # Testing
    - predeclared # https://golangci-lint.run/usage/linters/#predeclared
    - testifylint # https://golangci-lint.run/usage/linters/#testifylint
    - testpackage # https://golangci-lint.run/usage/linters/#testpackage
    - thelper # https://golangci-lint.run/usage/linters/#thelper
    - tparallel # https://golangci-lint.run/usage/linters/#tparallel

linters-settings:
  goheader:
    values:
      regexp:
        copyright-holder: "{{mod-year}} The PolyClient Authors"
    template: |-
      SPDX-FileCopyrightText: {{copyright-holder}}

      SPDX-License-Identifier: GPL-3.0-or-later WITH LicenseRef-PolyClient-Plugin-Exception

  revive:
    severity: error
    confidence: 0.8
    rules:
      - name: line-length-limit
        arguments: [200]
      - name: var-naming
        arguments:
          [
            [],
            [
              "AES",
              "API",
              "ASCII",
              "AST",
              "AWS",
              "BOM",
              "CLI",
              "CPU",
              "CSS",
              "CSV",
              "DNS",
              "DOM",
              "DOML",
              "EOF",
              "FTP",
              "GUI",
              "HTML",
              "HTTP",
              "HTTP",
              "HTTPS",
              "ID",
              "IDE",
              "IP",
              "IPv4",
              "IPv6",
              "IRC",
              "ISO",
              "JPEG",
              "JSON",
              "JWT",
              "KPI",
              "LDAP",
              "LSP",
              "MAC",
              "MD5",
              "MIME",
              "MVC",
              "NTP",
              "OAuth",
              "PCI",
              "PDF",
              "PNG",
              "REST",
              "RSA",
              "S3",
              "SAML",
              "SHA",
              "SMTP",
              "SOAP",
              "SQL",
              "SQL",
              "SSH",
              "SSH",
              "SSL",
              "TCP",
              "TLS",
              "TOML",
              "TSV",
              "UDP",
              "UI",
              "UID",
              "UIX",
              "URI",
              "URL",
              "UTF8",
              "UUID",
              "VPN",
              "Wasm",
              "WebGL",
              "WebRTC",
              "WebSocket",
              "WebWorker",
              "XML",
              "XML",
              "XSS",
              "YAML",
              "ZIP",
            ],
          ]
      - name: package-comments
      - name: dot-imports
      - name: duplicated-imports
      - name: blank-imports
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "disableStutteringCheck"
          - "checkPublicInterface"
          - "disableChecksOnFunctions"
      - name: receiver-naming
      - name: increment-decrement
      - name: indent-error-flow
      - name: empty-lines
      - name: early-return
      - name: filename-format
        arguments:
          - "^[_a-z][_a-z0-9]*\\.go$" # Override the default pattern to forbid .go files with uppercase letters and dashes.
      - name: confusing-naming
      - name: confusing-results
      - name: function-length
        arguments: [50, 0] # max lines in function, max lines in method
      - name: empty-block
        arguments:
          - "if"
          - "else"
          - "for"
          - "switch"
      - name: superfluous-else
      - name: unused-parameter
      - name: unused-receiver
      - name: unreachable-code
      - name: error-naming # Error variables should be prefixed with 'err'
      - name: error-return # Errors should be the last in the list of returned values
      - name: error-strings # Error strings should not be capitalized
      - name: errorf
      - name: use-errors-new
      - name: unhandled-error
        arguments:
          - "fmt.Printf"
          - "fmt.Println"
          - "fmt.Print"
          - "log.Print"
          - "log.Printf"
          - "log.Println"
          - "strings.Builder.WriteString"
          - "file.Close"
      - name: context-as-argument
      - name: context-keys-type
      - name: enforce-map-style
        arguments: ["literal"]
      - name: enforce-slice-style
        arguments: ["literal"]
      - name: enforce-repeated-arg-type-style
        arguments: ["short"]
      - name: var-declaration # Prevents redundant var declarations
      - name: time-naming # Enforces time unit suffix in variable names
      - name: use-any
      - name: identical-branches
      - name: if-return
      - name: increment-decrement
      - name: indent-error-flow
      - name: unexported-return # Warns when unexported type is returned from exported function
      - name: unexported-naming # Warns on wrongly named unexported symbols
      - name: atomic # Ensures atomic operation safety
      - name: waitgroup-by-value # Ensures WaitGroup is not passed by value
      - name: bool-literal-in-expr # Warns against direct boolean comparisons
      - name: constant-logical-expr # Finds constant logical expressions
      - name: datarace # Potential data races caused by goroutines
      - name: deep-exit # Prevents deep returns/breaks/continues
      - name: defer # Warns about defer usage issues
      - name: flag-parameter # Discourages boolean parameters
      - name: import-shadowing # Prevents import aliases shadowing other names
      - name: modifies-parameter # Warns when a function modifies its parameters
      - name: modifies-value-receiver # Warns when a method modifies its value receiver
      - name: range
      - name: range-val-in-closure # Prevents common range variable capture issues
      - name: range-val-address # Prevents common range variable address issues
      - name: string-format # Consistent string formatting
      - name: struct-tag # Validates struct tags
      - name: unconditional-recursion # Detects infinite recursion
      - name: unnecessary-stmt # Detects unnecessary statements
      - name: useless-break # Detects useless break statements
      - name: comment-spacings # Consistent comment spacing
      - name: cyclomatic # Cyclomatic complexity
        arguments: [15]

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - hugeParam # Can be too strict
      - rangeExprCopy # Often not worth the complexity
      - rangeValCopy # Often not worth the complexity

  mnd:
    checks:
      - argument
      - case
      - condition
      - operation
      - return
      - assign
    ignored-functions:
      - '^math\.'
      - '^http\.StatusText$'
      - '^os\.Mkdir$'
      - '^os\.MkdirAll$'
      - '^os\.Chmod$'
      - '^os\.OpenFile$'
      - '^os\.WriteFile$'
      - '^os\.Lstat$'
      - '^os\.Stat$'
      - '^os\.Fchmod$'
      - '^os\.Fchmodat$'
      - '^syscall\.Mkfifo$'
      - '^syscall\.Mknod$'
      - '^syscall\.Open$'
      - '^syscall\.Fchmod$'
      - '^ioutil\.WriteFile$'

  whitespace:
    multi-if: true
    multi-func: true

  wsl:
    allow-cuddle-declarations: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  include:
    - EXC0013 # exported type without comment
    - EXC0014 # exported function without comment
  exclude-rules:
    - path: _test\.go
      linters:
        - gocritic
        - gocyclo
        - gosec
        - govet
        - noctx
