version: "3"

vars:
  APP_NAME: polyclient

tasks:
  install:
    desc: Install the project dependencies and devtools
    cmds:
      - go mod tidy
      - task: init-workspace

  init:workspace:
    desc: Initialize Go workspace
    cmds:
      - ./scripts/init_workspace.sh

  dev:
    desc: Run the CLI in development mode for testing and debugging
    cmd: go run ./cmd/polyclient/main.go {{ .CLI_ARGS }}

  build:
    desc: Build the CLI binary
    cmd: go build -o bin/${APP_NAME} ./cmd

  build:plugins:
    desc: Build the plugins for WASM target
    cmds:
      - GOOS=wasip1 GOARCH=wasm go build -buildmode=c-shared -o ./plugins/sqlite/sqlite-plugin.wasm ./plugins/sqlite/main.go

  lint:
    desc: Check code quality and identify potential issues
    cmd: golangci-lint run ./...

  lint:fix:
    desc: Check code quality and identify potential issues + fix them where possible
    cmd: golangci-lint run ./... --fix

  format:
    desc: Apply standard Go code formatting to all project files
    cmd: go fmt ./...
