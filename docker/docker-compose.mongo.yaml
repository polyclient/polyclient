services:
  mongo:
    image: mongo:latest
    container_name: polyclient_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-testuser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-testpassword}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data: